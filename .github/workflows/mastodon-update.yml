name: Update Mastodon Sidebar

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  update-mastodon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install beautifulsoup4 requests

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.145.0'
          extended: true

      - name: Update Mastodon sidebar
        run: python scripts/mastodon.py

      - name: Build site
        run: hugo && mkdir -p docs/blog/feed && cp docs/blog/index.xml docs/blog/feed/index.html

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "Update Mastodon sidebar" && git pull --rebase && git push)
